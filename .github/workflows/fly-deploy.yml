name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-group

    steps:
      - name: Check Fly token
        id: fly-token
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN is not configured for this repository. Skipping Fly deploy."
          fi

      - name: Checkout
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup flyctl
        if: steps.fly-token.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        if: steps.fly-token.outputs.available == 'true'
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
