name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-group

    steps:
      - name: Check Fly token
        id: fly-token
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN is not configured for this repository. Skipping Fly deploy."
          fi

      - name: Checkout
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/checkout@v6

      - name: Install flyctl
        if: steps.fly-token.outputs.available == 'true'
        shell: bash
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Deploy to Fly
        if: steps.fly-token.outputs.available == 'true'
        run: flyctl deploy --remote-only --yes --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify public health endpoint
        if: steps.fly-token.outputs.available == 'true'
        shell: bash
        run: |
          response="$(curl --fail --silent --show-error --retry 10 --retry-delay 3 --retry-connrefused https://mermaduckle.fly.dev/api/health)"
          echo "$response"
          echo "$response" | grep -q '"database"'
