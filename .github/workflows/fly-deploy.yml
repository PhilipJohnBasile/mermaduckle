name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-group
      cancel-in-progress: true

    steps:
      - name: Check Fly token
        id: fly-token
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN is not configured for this repository. Skipping Fly deploy."
          fi

      - name: Checkout
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/checkout@v6

      - name: Install flyctl
        if: steps.fly-token.outputs.available == 'true'
        shell: bash
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Validate Fly volume config
        if: steps.fly-token.outputs.available == 'true'
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          volumes="$(flyctl volumes list -a mermaduckle --json)"
          echo "$volumes"
          if grep -q '^\[\[mounts\]\]' fly.toml; then
            config_has_mount=true
          else
            config_has_mount=false
          fi
          live_volume_count="$(VOLUMES_JSON="$volumes" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["VOLUMES_JSON"])
          print(len(payload))
          PY
          )"
          echo "config_has_mount=$config_has_mount"
          echo "live_volume_count=$live_volume_count"

          if [ "$live_volume_count" -gt 0 ] && [ "$config_has_mount" != "true" ]; then
            echo "::error::Fly app still has live volumes, but fly.toml no longer declares [[mounts]]. Retire the legacy volume before removing the mount stanza."
            exit 1
          fi

          if [ "$live_volume_count" -eq 0 ] && [ "$config_has_mount" = "true" ]; then
            echo "::warning::No live Fly volumes remain. The legacy [[mounts]] stanza can be removed from fly.toml."
          fi

      - name: Deploy to Fly
        if: steps.fly-token.outputs.available == 'true'
        run: flyctl deploy --remote-only --yes --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify public health endpoint
        if: steps.fly-token.outputs.available == 'true'
        shell: bash
        run: |
          response="$(curl --fail --silent --show-error --retry 10 --retry-delay 3 --retry-connrefused https://mermaduckle.fly.dev/api/health)"
          echo "$response"
          HEALTH_RESPONSE="$response" python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["HEALTH_RESPONSE"])
          services = payload.get("services", {})
          database_ok = services.get("database") == "ok"
          ollama_required = services.get("ollama_required", False)
          overall_ok = payload.get("status") == "ok"

          if not database_ok:
              print("Database health check failed", file=sys.stderr)
              sys.exit(1)

          if overall_ok:
              sys.exit(0)

          if ollama_required:
              print("Required service is degraded", file=sys.stderr)
              sys.exit(1)

          print("Health is degraded only because optional Ollama is unavailable; continuing.")
          PY
