version: '3.8'

services:
  mermaduckle:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - ollama
    networks:
      - mermaduckle-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - mermaduckle-net

volumes:
  ollama-data:

networks:
  mermaduckle-net:
    driver: bridge