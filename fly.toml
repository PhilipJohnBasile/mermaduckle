app = "mermaduckle"

[build]
  # Use the provided Dockerfile for Fly builds
  dockerfile = "deploy/Dockerfile.fly"

[env]
  # DATABASE_URL is set via `fly secrets set`

[[mounts]]
  source = "mermaduckle_data"
  destination = "/app/data"

[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    grace_period = "10s"
    interval = "15s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"
