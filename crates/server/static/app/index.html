<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaduckle — AI Agent Orchestration Platform</title>
  <meta name="description" content="Build, orchestrate, govern, and deploy AI agent workflows at enterprise scale">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-layout" id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
        </div>
        <div class="sidebar-logo-text">
          <h1>Mermaduckle</h1>
          <p>AI Agent Orchestration</p>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-left">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            <span>Dashboard</span>
          </span>
        </button>
        <!-- ... (rest of SPA omitted for brevity) ... -->
      </nav>

      <div class="sidebar-bottom">
        <div class="usage-card">
          <div class="usage-card-header">
            <p>Pro Plan</p>
            <span class="usage-badge">Active</span>
          </div>
          <p style="font-size:11px;color:var(--slate-400);margin-bottom:0.75rem;">2,500 agent runs/month</p>
          <div class="progress-bar"><div class="progress-fill" style="width:57%"></div></div>
          <p class="usage-text">1,432 used (57%)</p>
        </div>
        <div class="user-info">
          <div class="user-avatar"><span>JD</span></div>
          <div class="user-details">
            <p>John Doe</p>
            <p>john@company.com</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-content" id="page-content">
        <div class="loading-page"><div class="spinner"></div><p>Loading dashboard...</p></div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
